# =============================================================================
# .readthedocs.yaml — Read the Docs Build Configuration
# =============================================================================
# Configures the documentation build environment on Read the Docs.
# Activates when the MILIA repository is connected to readthedocs.org.
#
# Source: Read the Docs configuration file v2
#   (docs.readthedocs.io/en/stable/config-file/v2.html)
# =============================================================================

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
