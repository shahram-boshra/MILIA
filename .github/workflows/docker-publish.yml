# .github/workflows/docker-publish.yml
#
# Source evidence:
#   - GitHub Docs: "Publishing and installing a package with GitHub Actions"
#   - docker/login-action@v3, docker/metadata-action@v5, docker/build-push-action@v6
#     (current latest per Docker official docs and release pages, Feb 2026)
#   - actions/checkout@v6 (current latest per actions/checkout releases, Feb 2026)
#   - docker/metadata-action README: automatic org.opencontainers.image.source label
#     generation from GitHub context (enables GHCR → repository linking)
name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    # Only rebuild when image-affecting files change
    paths:
      - 'Dockerfile'
      - 'environment.yml'
      - 'milia_pipeline/**'
      - 'setup.py'
      - 'pyproject.toml'
  # Allow manual trigger for first-time build
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
