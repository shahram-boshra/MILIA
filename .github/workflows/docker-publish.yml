# .github/workflows/docker-publish.yml
#
# Source evidence:
#   - GitHub Docs: "Publishing and installing a package with GitHub Actions"
#   - docker/login-action@v3, docker/metadata-action@v5, docker/build-push-action@v6
#     (current latest per Docker official docs and release pages, Feb 2026)
#   - actions/checkout@v6 (current latest per actions/checkout releases, Feb 2026)
#   - docker/metadata-action README: automatic org.opencontainers.image.source label
#     generation from GitHub context (enables GHCR → repository linking)
name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    # Only rebuild when image-affecting files change
    paths:
      - 'Dockerfile'
      - 'environment.yml'
      - 'milia_pipeline/**'
      - 'setup.py'
      - 'pyproject.toml'
  # Allow manual trigger for first-time build
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # =========================================================================
  # Smoke-test job — satisfies §5f items 8 + 9 of the MILIA Release Guide
  # =========================================================================
  # Pulls the image just published to GHCR and runs the §5f acceptance checks
  # on a GitHub-hosted runner. Reasons for separate job (not steps in the
  # publish job):
  #   - Authoritative source: docker/build-push-action issue #225 — images
  #     loaded with `load: true` are NOT visible in subsequent jobs (each
  #     GitHub Actions job runs on a fresh runner). The published artifact
  #     must be `docker pull`'d in the testing job.
  #   - Testing the registry-pulled image is what reviewers will actually do,
  #     so this catches push-side issues (missing layers, wrong digest,
  #     auth misconfiguration) that an in-process `load: true` would mask.
  #
  # Acceptance criteria mapping:
  #   §5f #8 → "Test pull from your own machine" → satisfied by `docker pull`
  #            from a runner outside the build environment.
  #   §5f #9 → "milia CLI entry point works inside the container" → satisfied
  #            by `milia --help`, `milia --dry-run`, `python main.py --help`.
  #   §5f #8 → "pytest -m smoke passes" → satisfied by the `pytest -m smoke`
  #            invocation against /app/tests/ (verified present in the image
  #            via Dockerfile's `COPY . /app`).
  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Compute lowercase image reference
        # Docker reference-format spec requires lowercase repository names
        # (https://docs.docker.com/reference/cli/docker/image/tag/).
        # `${{ github.repository }}` preserves original case, so we lowercase
        # via `tr` here. The `docker/metadata-action@v5` used in build-and-push
        # auto-lowercases, which is why the push succeeded; here we replicate
        # that behavior at the shell level.
        id: image
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=${IMAGE_LOWER}:latest" >> "$GITHUB_OUTPUT"
          echo "Computed image reference: ${IMAGE_LOWER}:latest"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull just-published image from GHCR
        run: |
          docker pull ${{ steps.image.outputs.ref }}
          docker inspect ${{ steps.image.outputs.ref }} \
            --format 'Image: {{.Id}}{{"\n"}}Created: {{.Created}}{{"\n"}}Labels: {{json .Config.Labels}}'

      - name: §5f #9 — Verify milia CLI entry point (--help)
        run: |
          docker run --rm \
            --entrypoint /opt/conda/envs/shah_env/bin/milia \
            ${{ steps.image.outputs.ref }} \
            --help

      - name: §5f #9 — Verify milia --dry-run (configuration validation)
        run: |
          docker run --rm \
            --entrypoint /opt/conda/envs/shah_env/bin/milia \
            ${{ steps.image.outputs.ref }} \
            --dry-run

      - name: §5f #9 — Verify python main.py --help (fallback entry point)
        run: |
          docker run --rm \
            ${{ steps.image.outputs.ref }} \
            /opt/conda/envs/shah_env/bin/python /app/main.py --help

      - name: §5f #8 — Run smoke test suite (pytest -m smoke) inside container
        run: |
          docker run --rm \
            -w /app \
            ${{ steps.image.outputs.ref }} \
            /opt/conda/envs/shah_env/bin/pytest -m smoke --tb=short -q tests/
