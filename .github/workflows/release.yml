# =============================================================================
# MILIA — Release to PyPI
# =============================================================================
# Triggered when a version tag (v*.*.*) is pushed.
# Builds sdist + wheel, then publishes to PyPI via Trusted Publishers (OIDC).
#
# Source evidence:
#   - pyproject.toml: [build-system] requires setuptools>=77, name = "milia"
#   - PyPA Publishing Guide: https://packaging.python.org/en/latest/guides/
#     publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
#   - PyPI Trusted Publishers: https://docs.pypi.org/trusted-publishers/
#   - pypa/gh-action-pypi-publish@release/v1 (current recommended branch)
#   - actions/upload-artifact@v5, actions/download-artifact@v8 (current latest)
#
# SETUP REQUIRED (one-time, before first release):
#   1. Go to https://pypi.org/manage/project/milia/settings/publishing/
#      (or for a new project: https://pypi.org/manage/account/publishing/)
#   2. Add a new "GitHub Actions" trusted publisher:
#      - Owner: shahram-boshra
#      - Repository: MILIA
#      - Workflow name: release.yml
#      - Environment name: pypi
#   3. In GitHub repo Settings → Environments → create "pypi" environment
#      (optionally require manual approval for release protection)
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/milia
    permissions:
      id-token: write  # IMPORTANT: mandatory for Trusted Publishing

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
