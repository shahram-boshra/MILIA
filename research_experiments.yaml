# =============================================================================
# Milia Research Experiments Configuration
# =============================================================================
# Phase 3 Step 3.3: Systematic Experimentation Framework
#
# This file defines reproducible experiments for:
# - Ablation studies (transform importance)
# - Parameter sweeps (hyperparameter optimization)
# - Comparative analyses (method comparison)
#
# For ISI paper reproducibility and systematic research workflows.
#
# Integration Notes:
# - Uses TransformSpec format from config_containers.py (Phase 1 Step 2)
# - References milia custom transforms from custom_transforms.py (Phase 3.1)
# - Compatible with research_api.py experiment runners (Phase 3.3)
# - Validated by config_schemas.py ExperimentSchema (Phase 3.3.2)
# =============================================================================

experiments:
  # ===========================================================================
  # EXPERIMENT 1: Transform Importance Ablation Study
  # ===========================================================================
  # Research Question: Which transforms are critical for milia performance?
  # Methodology: Systematic removal of individual transforms
  # Expected Outcome: Vibrational modes and charges most important
  # ===========================================================================

  transform_ablation:
    name: "transform_ablation"
    description: "Systematic ablation study to determine transform importance for milia molecular property prediction"

    # Baseline: Full milia-enhanced transform pipeline
    base_transforms:
      - name: "AddSelfLoops"
        kwargs: {}
        enabled: true
        description: "Add self-loops for message passing"

      - name: "NormalizeVibrationalModes"
        kwargs:
          normalize_per_mode: true
          epsilon: 1.0e-8
        enabled: true
        description: "Normalize vibrational normal modes (milia-specific)"

      - name: "ScaleMullikenCharges"
        kwargs:
          scale_factor: 1.0
          center: false
        enabled: true
        description: "Scale Mulliken atomic charges (milia-specific)"

      - name: "GCNNorm"
        kwargs:
          add_self_loops: false  # Already added above
        enabled: true
        description: "GCN-style symmetric normalization"

    # Ablation variants: Remove one transform at a time
    ablations:
      - name: "baseline"
        description: "Full pipeline (all transforms enabled)"
        transforms:
          - name: "AddSelfLoops"
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - name: "ScaleMullikenCharges"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "no_self_loops"
        description: "Test importance of self-loops for message passing"
        transforms:
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - name: "ScaleMullikenCharges"
          - name: "GCNNorm"

      - name: "no_vibmodes"
        description: "Test importance of vibrational mode normalization"
        transforms:
          - name: "AddSelfLoops"
          - name: "ScaleMullikenCharges"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "no_charges"
        description: "Test importance of Mulliken charge scaling"
        transforms:
          - name: "AddSelfLoops"
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "no_normalization"
        description: "Test importance of graph normalization"
        transforms:
          - name: "AddSelfLoops"
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - name: "ScaleMullikenCharges"

      - name: "minimal"
        description: "Minimal baseline with only structural transforms"
        transforms:
          - name: "AddSelfLoops"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

    # Execution settings
    num_runs: 5
    random_seed: 42

    # Publication metadata
    hypothesis: "Vibrational mode normalization and Mulliken charge scaling are critical for milia; GCN normalization improves convergence but is less critical"
    expected_outcome: "Performance ranking: baseline > no_normalization > no_charges > no_vibmodes > minimal > no_self_loops"
    paper_reference: "Section 4.3: Ablation Studies - Transform Importance Analysis"

    metadata:
      research_context: "milia molecular property prediction"
      dataset_type: "DFT"
      primary_metric: "validation_mae"
      secondary_metrics: ["test_mae", "training_time", "convergence_epochs"]
      tags: ["ablation", "transforms", "milia", "importance"]

  # ===========================================================================
  # EXPERIMENT 2: DMC Uncertainty Threshold Parameter Sweep
  # ===========================================================================
  # Research Question: What is the optimal DMC uncertainty threshold?
  # Methodology: Systematic variation of max_uncertainty parameter
  # Expected Outcome: U-shaped curve with minimum around 0.1 kcal/mol
  # ===========================================================================

  uncertainty_threshold_sweep:
    name: "uncertainty_threshold_sweep"
    description: "Parameter sweep to find optimal DMC uncertainty filtering threshold for data quality"

    base_transforms:
      - name: "AddSelfLoops"
      - name: "NormalizeVibrationalModes"
        kwargs: {normalize_per_mode: true}
      - name: "GCNNorm"
        kwargs: {add_self_loops: false}

    # Parameter sweep configuration
    parameter_sweeps:
      - name: "sweep_0_max_uncertainty=0.01"
        transforms:
          - "AddSelfLoops"
          - name: "FilterByDMCUncertainty"
            kwargs: {max_uncertainty: 0.01, remove: false}
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - "GCNNorm"
        parameters: {max_uncertainty: 0.01}

      - name: "sweep_1_max_uncertainty=0.05"
        transforms:
          - "AddSelfLoops"
          - name: "FilterByDMCUncertainty"
            kwargs: {max_uncertainty: 0.05, remove: false}
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - "GCNNorm"
        parameters: {max_uncertainty: 0.05}

      - name: "sweep_2_max_uncertainty=0.1"
        transforms:
          - "AddSelfLoops"
          - name: "FilterByDMCUncertainty"
            kwargs: {max_uncertainty: 0.1, remove: false}
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - "GCNNorm"
        parameters: {max_uncertainty: 0.1}

      - name: "sweep_3_max_uncertainty=0.2"
        transforms:
          - "AddSelfLoops"
          - name: "FilterByDMCUncertainty"
            kwargs: {max_uncertainty: 0.2, remove: false}
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - "GCNNorm"
        parameters: {max_uncertainty: 0.2}

      - name: "sweep_4_max_uncertainty=0.5"
        transforms:
          - "AddSelfLoops"
          - name: "FilterByDMCUncertainty"
            kwargs: {max_uncertainty: 0.5, remove: false}
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - "GCNNorm"
        parameters: {max_uncertainty: 0.5}

      - name: "sweep_5_max_uncertainty=1.0"
        transforms:
          - "AddSelfLoops"
          - name: "FilterByDMCUncertainty"
            kwargs: {max_uncertainty: 1.0, remove: false}
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - "GCNNorm"
        parameters: {max_uncertainty: 1.0}

    num_runs: 3
    random_seed: 42

    hypothesis: "Strict uncertainty filtering (0.05-0.1 kcal/mol) improves model quality by removing noisy samples while maintaining sufficient training data"
    expected_outcome: "U-shaped performance curve with minimum validation MAE around 0.1 kcal/mol threshold; too strict removes useful data, too loose includes noise"
    paper_reference: "Section 4.4: Data Quality Analysis - DMC Uncertainty Impact"

    metadata:
      research_context: "DMC data quality optimization"
      dataset_type: "DMC"
      primary_metric: "validation_mae"
      secondary_metrics: ["test_mae", "dataset_size_after_filter"]
      tags: ["parameter_sweep", "dmc", "uncertainty", "data_quality"]

  # ===========================================================================
  # EXPERIMENT 3: Normalization Technique Comparison
  # ===========================================================================
  # Research Question: Which normalization is best for molecular graphs?
  # Methodology: Head-to-head comparison of different approaches
  # Expected Outcome: GCN normalization provides best balance
  # ===========================================================================

  normalization_comparison:
    name: "normalization_comparison"
    description: "Comparative study of normalization techniques for milia molecular graphs"

    base_transforms: []  # Each approach defines its own sequence

    # Comparative approaches
    ablations:  # Using ablations field for comparative variants
      - name: "gcn_norm"
        description: "GCN-style symmetric normalization"
        transforms:
          - name: "AddSelfLoops"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "no_norm"
        description: "No normalization baseline"
        transforms:
          - name: "AddSelfLoops"

      - name: "feature_scaling"
        description: "Feature scaling via charge normalization only"
        transforms:
          - name: "AddSelfLoops"
          - name: "ScaleMullikenCharges"
            kwargs: {scale_factor: 0.1, center: true}

      - name: "normalize_features"
        description: "L2 feature normalization"
        transforms:
          - name: "AddSelfLoops"
          - name: "NormalizeFeatures"
            kwargs: {p: 2.0, dim: 1}

    num_runs: 5
    random_seed: 42

    hypothesis: "GCN-style symmetric normalization provides the best balance of prediction accuracy and training stability for milia molecular property prediction"
    expected_outcome: "Performance ranking: gcn_norm > feature_scaling > normalize_features > no_norm"
    paper_reference: "Section 4.2: Preprocessing Pipeline Comparison"

    metadata:
      research_question: "Which normalization technique is most effective for milia quantum properties?"
      expected_best: "gcn_norm"
      dataset_type: "DFT"
      primary_metric: "validation_mae"
      evaluation_metrics: ["validation_mae", "test_mae", "training_time", "convergence_epochs", "gradient_stability"]
      tags: ["comparative", "normalization", "preprocessing"]

  # ===========================================================================
  # EXPERIMENT 4: Edge Dropout Parameter Optimization
  # ===========================================================================
  # Research Question: What is the optimal edge dropout rate?
  # Methodology: Systematic parameter sweep of dropout probability
  # Expected Outcome: Light dropout (0.1-0.2) improves generalization
  # ===========================================================================

  edge_dropout_optimization:
    name: "edge_dropout_optimization"
    description: "Parameter sweep to find optimal DropEdge probability for milia regularization"

    base_transforms:
      - name: "AddSelfLoops"
      - name: "GCNNorm"
        kwargs: {add_self_loops: false}
      - name: "NormalizeVibrationalModes"
        kwargs: {normalize_per_mode: true}

    parameter_sweeps:
      - name: "sweep_0_p=0.0"
        transforms:
          - "AddSelfLoops"
          - "GCNNorm"
          - "NormalizeVibrationalModes"
          - name: "DropEdge"
            kwargs: {p: 0.0}
        parameters: {p: 0.0}

      - name: "sweep_1_p=0.05"
        transforms:
          - "AddSelfLoops"
          - "GCNNorm"
          - "NormalizeVibrationalModes"
          - name: "DropEdge"
            kwargs: {p: 0.05}
        parameters: {p: 0.05}

      - name: "sweep_2_p=0.1"
        transforms:
          - "AddSelfLoops"
          - "GCNNorm"
          - "NormalizeVibrationalModes"
          - name: "DropEdge"
            kwargs: {p: 0.1}
        parameters: {p: 0.1}

      - name: "sweep_3_p=0.15"
        transforms:
          - "AddSelfLoops"
          - "GCNNorm"
          - "NormalizeVibrationalModes"
          - name: "DropEdge"
            kwargs: {p: 0.15}
        parameters: {p: 0.15}

      - name: "sweep_4_p=0.2"
        transforms:
          - "AddSelfLoops"
          - "GCNNorm"
          - "NormalizeVibrationalModes"
          - name: "DropEdge"
            kwargs: {p: 0.2}
        parameters: {p: 0.2}

      - name: "sweep_5_p=0.3"
        transforms:
          - "AddSelfLoops"
          - "GCNNorm"
          - "NormalizeVibrationalModes"
          - name: "DropEdge"
            kwargs: {p: 0.3}
        parameters: {p: 0.3}

      - name: "sweep_6_p=0.5"
        transforms:
          - "AddSelfLoops"
          - "GCNNorm"
          - "NormalizeVibrationalModes"
          - name: "DropEdge"
            kwargs: {p: 0.5}
        parameters: {p: 0.5}

    num_runs: 5
    random_seed: 42

    hypothesis: "Moderate edge dropout (0.1-0.2) improves model generalization by preventing overfitting to specific graph connectivity patterns"
    expected_outcome: "Optimal dropout rate around p=0.15; performance degrades with p>0.3 due to excessive edge removal"
    paper_reference: "Section 4.5: Regularization Analysis - Edge Dropout Effects"

    metadata:
      research_context: "Regularization and generalization"
      dataset_type: "DFT"
      primary_metric: "test_mae"
      secondary_metrics: ["validation_mae", "train_test_gap", "overfitting_score"]
      tags: ["parameter_sweep", "dropout", "regularization", "augmentation"]

  # ===========================================================================
  # EXPERIMENT 5: Molecular Feature Importance
  # ===========================================================================
  # Research Question: Which milia features are most informative?
  # Methodology: Ablation of different feature types
  # Expected Outcome: Vibrational modes most important
  # ===========================================================================

  molecular_feature_importance:
    name: "molecular_feature_importance"
    description: "Ablation study to determine importance of different milia molecular features"

    base_transforms:
      - name: "AddSelfLoops"
      - name: "NormalizeVibrationalModes"
        kwargs: {normalize_per_mode: true}
      - name: "ScaleMullikenCharges"
        kwargs: {scale_factor: 1.0}
      - name: "GCNNorm"
        kwargs: {add_self_loops: false}

    ablations:
      - name: "all_features"
        description: "Full feature set (baseline)"
        transforms:
          - "AddSelfLoops"
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - "ScaleMullikenCharges"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "no_vibmodes"
        description: "Without vibrational modes"
        transforms:
          - "AddSelfLoops"
          - "ScaleMullikenCharges"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "no_charges"
        description: "Without Mulliken charges"
        transforms:
          - "AddSelfLoops"
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "charges_only"
        description: "Only Mulliken charges (no vibrational modes)"
        transforms:
          - "AddSelfLoops"
          - "ScaleMullikenCharges"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "vibmodes_only"
        description: "Only vibrational modes (no charges)"
        transforms:
          - "AddSelfLoops"
          - name: "NormalizeVibrationalModes"
            kwargs: {normalize_per_mode: true}
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

      - name: "structural_only"
        description: "Only structural features (baseline)"
        transforms:
          - "AddSelfLoops"
          - name: "GCNNorm"
            kwargs: {add_self_loops: false}

    num_runs: 5
    random_seed: 42

    hypothesis: "All milia quantum features contribute to prediction accuracy; vibrational modes provide the most significant improvement"
    expected_outcome: "Performance ranking: all_features > no_charges > no_vibmodes > charges_only > vibmodes_only > structural_only"
    paper_reference: "Section 4.6: Feature Importance Analysis"

    metadata:
      research_context: "Feature engineering and selection"
      dataset_type: "DFT"
      primary_metric: "validation_mae"
      secondary_metrics: ["test_mae", "feature_dimensionality", "training_time"]
      tags: ["ablation", "features", "milia", "quantum_properties"]

# =============================================================================
# End of research_experiments.yaml
# =============================================================================
